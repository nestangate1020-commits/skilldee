<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สกิลดี — ค้นหาการ์ดวันพีช (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Kanit:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sea:#0B1D33;
    --sea-2:#12283F;
    --parchment:#E9DCC3;
    --parchment-2:#DECBA4;
    --ink:#2A2118;
    --gold:#C9A227;
    --seal:#B3402A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Kanit',sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -200px, #1A3A5C 0%, transparent 60%),
      var(--sea);
    color:var(--parchment);
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:34px 16px 10px;
  }
  .brand{
    font-size:13px;letter-spacing:.35em;color:var(--gold);
    text-transform:uppercase;font-weight:600;
  }
  h1{
    font-family:'Pirata One',cursive;
    font-size:clamp(40px,8vw,64px);
    color:var(--parchment);
    line-height:1.05;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  h1 .th{
    display:block;font-family:'Kanit',sans-serif;
    font-size:clamp(15px,3vw,18px);font-weight:400;
    color:#9FB3C8;letter-spacing:.05em;margin-top:6px;
  }

  /* ---------- Search bar ---------- */
  .search-wrap{
    max-width:680px;margin:22px auto 0;padding:0 16px;
  }
  .search-bar{
    display:flex;gap:0;
    border:2px solid var(--gold);
    border-radius:10px;overflow:hidden;
    background:var(--sea-2);
    box-shadow:0 6px 24px rgba(0,0,0,.4);
  }
  .search-bar input{
    flex:1;min-width:0;
    background:transparent;border:0;outline:0;
    color:var(--parchment);
    font-family:'Kanit',sans-serif;font-size:17px;
    padding:14px 16px;
  }
  .search-bar input::placeholder{color:#6C8296}
  .search-bar button{
    background:var(--gold);border:0;cursor:pointer;
    font-family:'Kanit',sans-serif;font-weight:600;font-size:16px;
    color:var(--ink);padding:0 22px;
    transition:filter .15s;
  }
  .search-bar button:hover{filter:brightness(1.1)}
  .search-bar button:focus-visible,
  .search-bar input:focus-visible{outline:3px solid #fff;outline-offset:-3px}
  .hint{
    text-align:center;font-size:13px;color:#7E93A8;margin-top:10px;
  }

  /* ---------- Status ---------- */
  .status{
    text-align:center;padding:40px 16px;color:#9FB3C8;font-size:16px;
  }
  .status.error{color:#E8A79A}
  .compass{
    width:44px;height:44px;margin:0 auto 14px;
    border:3px solid var(--gold);border-radius:50%;
    border-top-color:transparent;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.compass{animation:none}}

  /* ---------- Results grid ---------- */
  .grid{
    max-width:1100px;margin:28px auto;padding:0 16px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:18px;
  }

  /* ---------- Wanted-poster card ---------- */
  .card{
    background:
      linear-gradient(160deg,var(--parchment) 0%,var(--parchment-2) 100%);
    color:var(--ink);
    border-radius:6px;
    padding:10px 10px 12px;
    border:1px solid #B49F72;
    outline:4px double #8A7448;
    outline-offset:-8px;
    box-shadow:0 8px 18px rgba(0,0,0,.45);
    display:flex;flex-direction:column;
    transition:transform .15s;
  }
  .card:hover{transform:translateY(-4px)}
  .card .wanted{
    font-family:'Pirata One',cursive;
    text-align:center;font-size:15px;letter-spacing:.25em;
    color:#8A7448;margin-bottom:6px;
  }
  .card img{
    width:100%;border-radius:4px;display:block;
    background:#C9B893;min-height:120px;
  }
  .card .name{
    font-weight:600;font-size:16px;margin:10px 2px 2px;
    line-height:1.25;
  }
  .card .meta{
    font-family:'Chakra Petch',monospace;
    font-size:12.5px;color:#5A4B34;margin:0 2px;
  }
  .card .foot{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:auto;padding-top:10px;
  }
  .stamp{
    font-family:'Chakra Petch',monospace;font-weight:600;
    font-size:12px;letter-spacing:.08em;
    color:var(--seal);
    border:2px solid var(--seal);border-radius:4px;
    padding:2px 8px;transform:rotate(-3deg);
    background:rgba(179,64,42,.06);
  }
  .power{
    font-family:'Chakra Petch',monospace;font-size:13px;font-weight:600;
    color:var(--ink);
  }

  /* ---------- Pager ---------- */
  .pager{
    display:flex;justify-content:center;align-items:center;gap:16px;
    padding:6px 16px 40px;
  }
  .pager[hidden]{display:none}
  .pager button{
    background:transparent;border:2px solid var(--gold);
    color:var(--gold);border-radius:8px;
    font-family:'Kanit',sans-serif;font-weight:500;font-size:15px;
    padding:8px 18px;cursor:pointer;transition:background .15s,color .15s;
  }
  .pager button:hover:not(:disabled){background:var(--gold);color:var(--ink)}
  .pager button:disabled{opacity:.3;cursor:default}
  .pager .page-label{font-size:14px;color:#9FB3C8}

  footer{
    text-align:center;font-size:12px;color:#5F7488;
    padding:0 16px 30px;line-height:1.7;
  }
</style>
</head>
<body>

<header>
  <div class="brand">SkillDee · Prototype</div>
  <h1>Grand Line Search
    <span class="th">ค้นหาการ์ดวันพีช — ฐานข้อมูลจาก API TCG</span>
  </h1>
</header>

<div class="search-wrap">
  <div class="search-bar">
    <input id="q" type="text" placeholder="พิมพ์ชื่อการ์ด เช่น luffy, zoro, nami…" autocomplete="off">
    <button id="go">ค้นหา</button>
  </div>
  <div class="hint">ค้นหาด้วยชื่อภาษาอังกฤษ (ฐานข้อมูลอิงเวอร์ชัน EN)</div>
</div>

<div id="out"></div>
<div class="pager" id="pager" hidden>
  <button id="prev">← ก่อนหน้า</button>
  <span class="page-label" id="pageLabel"></span>
  <button id="next">ถัดไป →</button>
</div>

<footer>
  ข้อมูลการ์ดจาก apitcg.com (โปรเจกต์ชุมชน ไม่ใช่ผลิตภัณฑ์ทางการของ Bandai)<br>
  ⚠︎ หน้านี้ฝัง API key ไว้ฝั่ง client เพื่อทดสอบเท่านั้น — เวอร์ชันจริงต้องเรียกผ่าน backend
</footer>

<script>
const API_KEY = '40d47b3263b98d5196544e711de9cf0bd3be7e6ebcce96ff2f6362b3247a73b9';
const BASE = 'https://apitcg.com/api/one-piece/cards';

const out = document.getElementById('out');
const pager = document.getElementById('pager');
const pageLabel = document.getElementById('pageLabel');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const input = document.getElementById('q');

let state = { query:'', page:1, totalPages:1 };

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showLoading(){
  pager.hidden = true;
  out.innerHTML = '<div class="status"><div class="compass"></div>กำลังออกเรือค้นหา…</div>';
}

function showError(msg){
  pager.hidden = true;
  out.innerHTML = '<div class="status error">' + esc(msg) + '</div>';
}

async function search(query, page){
  showLoading();
  state.query = query; state.page = page;
  try{
    const url = BASE + '?name=' + encodeURIComponent(query) + '&page=' + page;
    const res = await fetch(url, { headers:{ 'x-api-key': API_KEY } });
    if(res.status === 401 || res.status === 403){
      showError('API key ไม่ผ่านการตรวจสอบ (HTTP ' + res.status + ') — ลองเช็ค key ในหน้า Platform อีกครั้ง');
      return;
    }
    if(!res.ok){
      showError('เซิร์ฟเวอร์ตอบกลับผิดปกติ (HTTP ' + res.status + ')');
      return;
    }
    const json = await res.json();
    const cards = json.data || [];
    state.totalPages = json.totalPages || 1;
    render(cards, json.total);
  }catch(err){
    showError('เชื่อมต่อ API ไม่ได้ — อาจติด CORS เมื่อเรียกจากเบราว์เซอร์โดยตรง ถ้าเจอปัญหานี้ต้องเรียกผ่าน backend/proxy ของเราเอง (' + err.message + ')');
  }
}

function render(cards, total){
  if(!cards.length){
    showError('ไม่พบการ์ดชื่อ "' + state.query + '" — ลองสะกดแบบอื่นดูครับ');
    return;
  }
  const html = cards.map(c => {
    const img = c.images?.small || c.images?.large || '';
    const rarity = c.rarity || '—';
    const code = c.code || c.id || '';
    const setName = c.set?.name || '';
    const power = c.power && c.power !== '-' ? 'PWR ' + esc(c.power) : '';
    const cost = c.cost && c.cost !== '-' ? 'COST ' + esc(c.cost) : '';
    return `
    <div class="card">
      <div class="wanted">WANTED</div>
      ${img ? `<img src="${esc(img)}" alt="${esc(c.name)}" loading="lazy">` : ''}
      <div class="name">${esc(c.name)}</div>
      <div class="meta">${esc(code)}${setName ? ' · ' + esc(setName) : ''}</div>
      <div class="foot">
        <span class="stamp">${esc(rarity)}</span>
        <span class="power">${power || cost}</span>
      </div>
    </div>`;
  }).join('');
  out.innerHTML = '<div class="grid">' + html + '</div>';
  pageLabel.textContent = 'หน้า ' + state.page + ' / ' + state.totalPages +
    (total ? ' (' + total + ' ใบ)' : '');
  prevBtn.disabled = state.page <= 1;
  nextBtn.disabled = state.page >= state.totalPages;
  pager.hidden = false;
}

document.getElementById('go').addEventListener('click', () => {
  const q = input.value.trim();
  if(q) search(q, 1);
});
input.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const q = input.value.trim();
    if(q) search(q, 1);
  }
});
prevBtn.addEventListener('click', () => search(state.query, state.page - 1));
nextBtn.addEventListener('click', () => search(state.query, state.page + 1));
</script>
</body>
</html>
