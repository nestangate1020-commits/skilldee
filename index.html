function Stars({ rating }) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <span className="inline-flex items-center gap-0.5">
      {[...Array(full)].map((_, i) => <Star key={i} className="w-3.5 h-3.5 fill-amber-500 text-amber-500" />)}
      {half && <StarHalf className="w-3.5 h-3.5 fill-amber-500 text-amber-500" />}
    </span>
  );
}

function App() {
  const [lang, setLang] = useState("th");
  const [langOpen, setLangOpen] = useState(false);
  const [page, setPage] = useState("home");
  const [course, setCourse] = useState(null);
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("all");
  const [cart, setCart] = useState([]);
  const [user, setUser] = useState(null);
  const [enrolled, setEnrolled] = useState([]);
  const [done, setDone] = useState({});
  const [authOpen, setAuthOpen] = useState(false);
  const [authMode, setAuthMode] = useState("login");
  const [authName, setAuthName] = useState("");
  const [authEmail, setAuthEmail] = useState("");
  const [openSec, setOpenSec] = useState([0]);
  const [current, setCurrent] = useState("0-0");
  const [toast, setToast] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);
  const [accountOpen, setAccountOpen] = useState(false);
  const [payMethod, setPayMethod] = useState("card");
  const [card, setCard] = useState({ num: "", name: "", exp: "", cvv: "" });
  const [paying, setPaying] = useState(false);
  const [payDone, setPayDone] = useState(false);

  const t = T[lang];
  // เนื้อหาคอร์สมีแค่ th/en — ภาษาอื่น fallback เป็น en
  const L = (obj) => obj[lang] ?? obj.en ?? obj.th;
  const fmt = (n) => n.toLocaleString(LOCALES[lang]);
  const catName = (id) => { const c = CATEGORIES.find(x => x.id === id); return c ? c[lang] : id; };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  // ติดตามสถานะล็อกอิน Google (คงอยู่แม้รีเฟรชหน้า)
  useEffect(() => {
    getRedirectResult(auth).catch(() => {});
    const unsub = onAuthStateChanged(auth, (u) => {
      if (u) {
        setUser({
          name: u.displayName || (u.email ? u.email.split("@")[0] : "User"),
          email: u.email || "",
          photo: u.photoURL || null,
          google: true,
        });
      } else {
        setUser(prev => (prev && prev.google ? null : prev));
      }
    });
    return unsub;
  }, []);

  const googleLogin = async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
      setAuthOpen(false); setAccountOpen(false);
      showToast(t.toastLogin);
    } catch (err) {
      if (err && (err.code === "auth/popup-blocked" || err.code === "auth/popup-closed-by-user" || err.code === "auth/cancelled-popup-request")) {
        if (err.code === "auth/popup-blocked") {
          try { await signInWithRedirect(auth, provider); } catch (e) {}
        }
      } else {
        showToast("Google login: " + (err && err.code ? err.code : "error"));
      }
    }
  };

  const handleLogout = () => {
    signOut(auth).catch(() => {});
    setUser(null); setPage("home");
  };

  const filtered = useMemo(() => COURSES.filter(c => {
    const hay = (c.title.th + c.title.en + c.instructor.th + c.instructor.en + catName(c.cat)).toLowerCase();
    return (category === "all" || c.cat === category) &&
      (search.trim() === "" || hay.includes(search.toLowerCase()));
  }), [search, category, lang]);

  const openCourse = (c) => { setCourse(c); setOpenSec([0]); setPage("detail"); window.scrollTo(0, 0); };
  const inCart = (id) => cart.some(c => c.id === id);
  const isEnrolled = (id) => enrolled.includes(id);

  const addToCart = (c) => {
    if (inCart(c.id)) { setPage("cart"); return; }
    setCart([...cart, c]); showToast(t.toastCart);
  };

  const checkout = () => {
    if (!user) { setAuthOpen(true); return; }
    setPayDone(false); setPaying(false); setPage("checkout"); window.scrollTo(0, 0);
  };

  const formatCardNum = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
  const formatExp = (v) => {
    const d = v.replace(/\D/g, "").slice(0, 4);
    return d.length > 2 ? d.slice(0, 2) + "/" + d.slice(2) : d;
  };

  const completePayment = () => {
    if (paying) return;
    if (payMethod === "card") {
      const numOk = card.num.replace(/\s/g, "").length === 16;
      const expOk = /^\d{2}\/\d{2}$/.test(card.exp);
      if (!numOk || !card.name.trim() || !expOk || card.cvv.length < 3) { showToast(t.invalidCard); return; }
    }
    setPaying(true);
    setTimeout(() => {
      setEnrolled(prev => [...prev, ...cart.map(c => c.id).filter(id => !prev.includes(id))]);
      setCart([]); setPaying(false); setPayDone(true);
      setCard({ num: "", name: "", exp: "", cvv: "" });
    }, 1800);
  };

  const enrollFree = (c) => {
    if (!user) { setAuthOpen(true); return; }
    if (!isEnrolled(c.id)) setEnrolled([...enrolled, c.id]);
    startLearn(c);
  };

  const startLearn = (c) => { setCourse(c); setCurrent("0-0"); setOpenSec([0]); setPage("learn"); window.scrollTo(0, 0); };

  const submitAuth = (e) => {
    e.preventDefault();
    if (!authEmail.trim()) return;
    setUser({ name: authMode === "signup" ? (authName || t.newUser) : authEmail.split("@")[0], email: authEmail });
    setAuthOpen(false); setAuthName(""); setAuthEmail("");
    showToast(authMode === "signup" ? t.toastSignup : t.toastLogin);
  };

  const toggleDone = (cid, key) => {
    const cur = done[cid] || [];
    setDone({ ...done, [cid]: cur.includes(key) ? cur.filter(k => k !== key) : [...cur, key] });
  };

  const progress = (c) => {
    const total = c.sections.reduce((s, sec) => s + sec.lectures.length, 0);
    const d = (done[c.id] || []).length;
    return total ? Math.round((d / total) * 100) : 0;

            <div className="flex justify-between text-sm text-zinc-600"><span>{t.normalPrice}</span><span className="line-through">฿{fmt(totalOld)}</span></div>
            <div className="flex justify-between text-sm text-red-600 font-bold mt-1"><span>{t.discountLabel}</span><span>-฿{fmt(totalOld - totalPrice)}</span></div>
            <div className="flex justify-between text-xl font-extrabold mt-2 pt-2 border-t border-zinc-200"><span>{t.total}</span><span>฿{fmt(totalPrice)}</span></div>
            <button onClick={checkout} className="w-full bg-violet-700 hover:bg-violet-800 text-white font-bold py-3 rounded-lg mt-4">
              {user ? t.payDemo : t.loginToPay}
            </button>
            <p className="text-xs text-zinc-400 text-center mt-2">{t.demoNote}</p>
          </div>
        </>
      )}
    </div>
  );

  // ---------- หน้าชำระเงิน (จำลอง) ----------
  const inputCls = "w-full border border-zinc-300 rounded-lg px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-violet-500";
  const Checkout = (
    <div className="max-w-lg mx-auto px-4 py-6 pb-24 sm:pb-10">
      {payDone ? (
        <div className="text-center py-14">
          <CheckCircle2 className="w-16 h-16 text-emerald-600 mx-auto" />
          <h1 className="text-2xl font-extrabold mt-4">{t.paySuccess}</h1>
          <p className="text-zinc-500 mt-2">{t.paySuccessSub}</p>
          <button onClick={() => setPage("mylearning")} className="mt-6 bg-violet-700 hover:bg-violet-800 text-white font-bold px-6 py-3 rounded-lg">{t.goLearn}</button>
        </div>
      ) : (
        <>
          <button onClick={() => setPage("cart")} className="flex items-center gap-1 text-sm text-zinc-500 hover:text-zinc-900 mb-3">
            <ArrowLeft className="w-4 h-4" /> {t.backToCart}
          </button>
          <h1 className="text-2xl font-extrabold">{t.payTitle}</h1>

          <div className="bg-amber-50 border border-amber-300 text-amber-800 text-sm font-bold rounded-lg p-3 mt-3">
            ⚠️ {t.demoPayNote}
          </div>

          <div className="border border-zinc-200 rounded-lg p-4 mt-4">
            <h2 className="font-bold text-sm text-zinc-500 uppercase mb-2">{t.orderSummary}</h2>
            {cart.map(c => (
              <div key={c.id} className="flex justify-between text-sm py-1">
                <span className="text-zinc-700 line-clamp-1 pr-3">{L(c.title)}</span>
                <span className="font-bold shrink-0">฿{fmt(c.price)}</span>
              </div>
            ))}
            <div className="flex justify-between font-extrabold text-lg mt-2 pt-2 border-t border-zinc-200">
              <span>{t.total}</span><span>฿{fmt(totalPrice)}</span>
            </div>
          </div>

          <h2 className="font-bold mt-5 mb-2">{t.payMethodLabel}</h2>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setPayMethod("card")}
              className={`flex items-center justify-center gap-2 py-3 rounded-lg border text-sm font-bold ${payMethod === "card" ? "border-violet-700 bg-violet-50 text-violet-800" : "border-zinc-300 text-zinc-600"}`}>
              <CreditCard className="w-4 h-4" /> {t.cardMethod}
            </button>
            <button onClick={() => setPayMethod("qr")}
              className={`flex items-center justify-center gap-2 py-3 rounded-lg border text-sm font-bold ${payMethod === "qr" ? "border-violet-700 bg-violet-50 text-violet-800" : "border-zinc-300 text-zinc-600"}`}>
              <QrCode className="w-4 h-4" /> {t.promptpay}
            </button>
          </div>

          {payMethod === "card" ? (
            <div className="mt-4 space-y-3">
              <input value={card.num} onChange={e => setCard({ ...card, num: formatCardNum(e.target.value) })}
                placeholder={t.cardNumber + " (0000 0000 0000 0000)"} inputMode="numeric" className={inputCls} />
              <input value={card.name} onChange={e => setCard({ ...card, name: e.target.value })}
                placeholder={t.cardName} className={inputCls} />
              <div className="grid grid-cols-2 gap-3">
                <input value={card.exp} onChange={e => setCard({ ...card, exp: formatExp(e.target.value) })}
                  placeholder={t.expiry} inputMode="numeric" className={inputCls} />
                <input value={card.cvv} onChange={e => setCard({ ...card, cvv: e.target.value.replace(/\D/g, "").slice(0, 4) })}
                  placeholder={t.cvvLabel} inputMode="numeric" type="password" className={inputCls} />
              </div>
              <button onClick={() => setCard({ num: "4242 4242 4242 4242", name: "DEMO USER", exp: "12/29", cvv: "123" })}
                className="text-sm text-violet-700 font-bold">✨ {t.useTestCard}</button>
            </div>
          ) : (
            <div className="mt-4 border border-zinc-200 rounded-lg p-6 text-center">
              <div className="w-40 h-40 mx-auto bg-white border-4 border-zinc-900 rounded-lg flex items-center justify-center">
                <QrCode className="w-28 h-28 text-zinc-900" />
              </div>
              <p className="text-sm text-zinc-500 mt-3">{t.scanQr}</p>
              <p className="font-extrabold text-lg mt-1">฿{fmt(totalPrice)}</p>
            </div>
          )}

          <button onClick={completePayment} disabled={paying}
            className="w-full bg-violet-700 hover:bg-violet-800 disabled:opacity-60 text-white font-bold py-4 rounded-lg mt-5 flex items-center justify-center gap-2">
            {paying ? (<><Loader2 className="w-5 h-5 animate-spin" /> {t.processing}</>) : (payMethod === "card" ? `${t.payNow} — ฿${fmt(totalPrice)}` : t.confirmPaid)}
          </button>
          <p className="text-xs text-zinc-400 text-center mt-2 flex items-center justify-center gap-1"><Lock className="w-3 h-3" /> {t.secureNote}</p>
        </>
      )}
    </div>
  );

  // ---------- คอร์สของฉัน ----------
  const myCourses = COURSES.filter(c => enrolled.includes(c.id));
  const MyLearning = (
    <div className="max-w-6xl mx-auto px-4 py-6">
      <h1 className="text-2xl font-extrabold">{t.myCourses}</h1>
      {myCourses.length === 0 ? (
        <div className="text-center py-16 border border-dashed border-zinc-300 rounded-lg mt-4">
          <PlayCircle className="w-10 h-10 mx-auto text-zinc-300 mb-3" />
          <p className="font-bold text-zinc-700">{t.noEnrolled}</p>
          <p className="text-sm text-zinc-500 mt-1">{t.noEnrolledSub}</p>
          <button onClick={() => setPage("home")} className="mt-4 bg-violet-700 text-white font-bold px-5 py-2.5 rounded-lg hover:bg-violet-800">{t.findCourse}</button>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">
          {myCourses.map(c => {
            const pct = progress(c);
            return (
              <button key={c.id} onClick={() => startLearn(c)} className="text-left border border-zinc-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow bg-white">
                <Thumb c={c} className="h-28 w-full" />
                <div className="p-3">
                  <h3 className="font-bold text-sm leading-snug line-clamp-2">{L(c.title)}</h3>
                  <p className="text-xs text-zinc-500 mt-1">{L(c.instructor)}</p>
                  <div className="h-1.5 bg-zinc-200 rounded-full mt-3 overflow-hidden">
                    <div className="h-full bg-violet-700 rounded-full" style={{ width: `${pct}%` }} />
                  </div>
                  <p className="text-xs text-zinc-500 mt-1">{pct === 0 ? t.start : pct === 100 ? t.finishedAll : `${t.learned} ${pct}%`}</p>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );

  // ---------- Modal สมัคร/ล็อกอิน ----------
  const AuthModal = authOpen && (
    <div className="fixed inset-0 z-50 bg-black flex items-center justify-center p-4 bg-opacity-50" onClick={() => setAuthOpen(false)}>
      <div className="bg-white rounded-xl w-full max-w-sm p-6 relative" onClick={e => e.stopPropagation()}>
        <button onClick={() => setAuthOpen(false)} className="absolute top-3 right-3 p-1 text-zinc-400 hover:text-zinc-900" aria-label="close"><X className="w-5 h-5" /></button>
        <h2 className="text-xl font-extrabold">{authMode === "login" ? t.loginTitle : t.signupTitle}</h2>
        <p className="text-sm text-zinc-500 mt-1">{t.authNote}</p>
        <button onClick={googleLogin} className="w-full border border-zinc-300 rounded-lg py-3 font-bold flex items-center justify-center gap-2 hover:bg-zinc-50 mt-4">
          <GoogleG /> {t.googleBtn}
        </button>
        <div className="flex items-center gap-3 mt-4">
          <div className="flex-1 h-px bg-zinc-200" />
          <span className="text-xs text-zinc-400">{t.orWord}</span>
          <div className="flex-1 h-px bg-zinc-200" />
        </div>
        <div className="mt-4 space-y-3">
          {authMode === "signup" && (
            <input value={authName} onChange={e => setAuthName(e.target.value)} placeholder={t.yourName}
              className="w-full border border-zinc-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500" />
          )}
          <input value={authEmail} onChange={e => setAuthEmail(e.target.value)} type="email" placeholder={t.email}
            className="w-full border border-zinc-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500" />
          <input type="password" placeholder={t.password}
            className="w-full border border-zinc-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500" />
          <button onClick={submitAuth} className="w-full bg-violet-700 hover:bg-violet-800 text-white font-bold py-3 rounded-lg">
            {authMode === "login" ? t.doLogin : t.doSignup}
          </button>
        </div>
        <p className="text-sm text-center mt-4 text-zinc-500">
          {authMode === "login" ? t.noAccount : t.haveAccount}
          <button onClick={() => setAuthMode(authMode === "login" ? "signup" : "login")} className="text-violet-700 font-bold">
            {authMode === "login" ? t.signup : t.doLogin}
          </button>
        </p>
      </div>
    </div>
  );

  // ---------- แถบเมนูล่าง (มือถือ) ----------
  const BottomNav = (
    <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 z-40 grid grid-cols-5">
      {[
        { k: "home", icon: HomeIcon, label: t.navHome, act: () => { setPage("home"); window.scrollTo(0, 0); } },
        { k: "searchtab", icon: Search, label: t.navSearch, act: () => { setPage("home"); setTimeout(() => { const el = document.getElementById("search-mobile"); if (el) { el.focus(); window.scrollTo(0, 0); } }, 60); } },
        { k: "mylearning", icon: PlayCircle, label: t.navLearn, act: () => setPage("mylearning") },
        { k: "cart", icon: ShoppingCart, label: t.navCart, act: () => setPage("cart"), badge: cart.length },
        { k: "account", icon: UserCircle, label: t.navAccount, act: () => setAccountOpen(true) },
      ].map(item => {
        const active = page === item.k;
        const Icon = item.icon;
        return (
          <button key={item.k} onClick={item.act} className="flex flex-col items-center justify-center gap-0.5 py-1.5 relative">
            <span className="relative">
              <Icon className={`w-5 h-5 ${active ? "text-violet-700" : "text-zinc-500"}`} />
              {item.badge > 0 && (
                <span className="absolute -top-1.5 -right-2 bg-violet-700 text-white text-xs font-bold w-4 h-4 rounded-full flex items-center justify-center">{item.badge}</span>
              )}
            </span>
            <span className={`text-xs leading-none w-full text-center truncate px-0.5 ${active ? "text-violet-700 font-bold" : "text-zinc-500"}`}>{item.label}</span>
          </button>
        );
      })}
    </nav>
  );

  // ---------- แผงบัญชีแบบเลื่อนขึ้น (มือถือ) ----------
  const AccountSheet = accountOpen && (
    <div className="fixed inset-0 z-50 sm:hidden" onClick={() => setAccountOpen(false)}>
      <div className="absolute inset-0 bg-black bg-opacity-50" />
      <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-5 pb-8" onClick={e => e.stopPropagation()}>
        <div className="w-10 h-1 bg-zinc-300 rounded-full mx-auto mb-4" />
        {user ? (
          <>
            <div className="flex items-center gap-3 pb-4 border-b border-zinc-100">
              <div className="w-11 h-11 rounded-full bg-zinc-900 text-white font-bold flex items-center justify-center text-lg overflow-hidden">
                {user.photo ? <img src={user.photo} alt="" className="w-11 h-11 object-cover" referrerPolicy="no-referrer" /> : user.name[0].toUpperCase()}
              </div>
              <div className="min-w-0">
                <p className="font-bold">{user.name}</p>
                <p className="text-sm text-zinc-500 truncate">{user.email}</p>
              </div>
            </div>
            <button onClick={() => { setPage("mylearning"); setAccountOpen(false); }} className="w-full text-left py-3.5 font-bold border-b border-zinc-100">{t.myCourses}</button>
            <button onClick={() => { handleLogout(); setAccountOpen(false); }} className="w-full text-left py-3.5 font-bold text-red-600">{t.logout}</button>
          </>
        ) : (
          <>
            <h2 className="font-extrabold text-lg mb-4">{t.account}</h2>
            <button onClick={googleLogin} className="w-full border border-zinc-300 font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 mb-2"><GoogleG /> {t.googleBtn}</button>
            <button onClick={() => { setAuthMode("login"); setAuthOpen(true); setAccountOpen(false); }} className="w-full bg-violet-700 text-white font-bold py-3.5 rounded-lg">{t.login}</button>
            <button onClick={() => { setAuthMode("signup"); setAuthOpen(true); setAccountOpen(false); }} className="w-full border border-zinc-900 font-bold py-3.5 rounded-lg mt-2">{t.signup}</button>
          </>
        )}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-white text-zinc-900 pb-16 sm:pb-0"
      style={{ fontFamily: "'Noto Sans Thai', 'Noto Sans SC', 'Noto Sans JP', 'Sarabun', system-ui, sans-serif" }}
      onClick={() => { if (menuOpen) setMenuOpen(false); if (langOpen) setLangOpen(false); }}>
      {Header}
      {page === "home" && Home}
      {page === "detail" && Detail}
      {page === "learn" && Learn}
      {page === "cart" && Cart}
      {page === "checkout" && Checkout}
      {page === "mylearning" && MyLearning}
      {AuthModal}
      {BottomNav}
      {AccountSheet}
      {toast && (
        <div className="fixed bottom-20 sm:bottom-5 left-1/2 -translate-x-1/2 bg-zinc-900 text-white text-sm font-bold px-4 py-2.5 rounded-full shadow-lg z-50 whitespace-nowrap">
          {toast}
        </div>
      )}
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
