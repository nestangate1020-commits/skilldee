// ---------- ส่วนประกอบย่อย ----------
function Stars({ rating }) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  return (
    <span className="inline-flex items-center gap-0.5">
      {[...Array(full)].map((_, i) => <Star key={i} className="w-3.5 h-3.5 fill-amber-500 text-amber-500" />)}
      {half && <StarHalf className="w-3.5 h-3.5 fill-amber-500 text-amber-500" />}
    </span>
  );
}

        {user ? (
          <>
            <div className="flex items-center gap-3 pb-4 border-b border-zinc-100">
              <div className="w-11 h-11 rounded-full bg-zinc-900 text-white font-bold flex items-center justify-center text-lg">{user.name[0].toUpperCase()}</div>
              <div className="min-w-0">
                <p className="font-bold">{user.name}</p>
                <p className="text-sm text-zinc-500 truncate">{user.email}</p>
              </div>
            </div>
            <button onClick={() => { setPage("mylearning"); setAccountOpen(false); }} className="w-full text-left py-3.5 font-bold border-b border-zinc-100">{t.myCourses}</button>
            <button onClick={() => { setUser(null); setAccountOpen(false); setPage("home"); }} className="w-full text-left py-3.5 font-bold text-red-600">{t.logout}</button>
          </>
        ) : (
          <>
            <h2 className="font-extrabold text-lg mb-4">{t.account}</h2>
            <button onClick={() => { setAuthMode("login"); setAuthOpen(true); setAccountOpen(false); }} className="w-full bg-violet-700 text-white font-bold py-3.5 rounded-lg">{t.login}</button>
            <button onClick={() => { setAuthMode("signup"); setAuthOpen(true); setAccountOpen(false); }} className="w-full border border-zinc-900 font-bold py-3.5 rounded-lg mt-2">{t.signup}</button>
          </>
        )}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-white text-zinc-900 pb-16 sm:pb-0"
      style={{ fontFamily: "'Noto Sans Thai', 'Noto Sans SC', 'Noto Sans JP', 'Sarabun', system-ui, sans-serif" }}
      onClick={() => { if (menuOpen) setMenuOpen(false); if (langOpen) setLangOpen(false); }}>
      {Header}
      {page === "home" && Home}
      {page === "detail" && Detail}
      {page === "learn" && Learn}
      {page === "cart" && Cart}
      {page === "mylearning" && MyLearning}
      {AuthModal}
      {BottomNav}
      {AccountSheet}
      {toast && (
        <div className="fixed bottom-20 sm:bottom-5 left-1/2 -translate-x-1/2 bg-zinc-900 text-white text-sm font-bold px-4 py-2.5 rounded-full shadow-lg z-50 whitespace-nowrap">
          {toast}
        </div>
      )}
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
